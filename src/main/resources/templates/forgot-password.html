<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/global.css}"/>
    <title>Forgot Password</title>
    <meta charset="UTF-8"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a0f1e; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; border-radius: 16px; padding: 50px 45px; width: 440px; box-shadow: 0 25px 60px rgba(0,0,0,0.5); }
        .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: #1a237e; text-decoration: none; margin-bottom: 28px; font-weight: 500; }
        .icon-wrap { width: 64px; height: 64px; background: #e8eaf6; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 30px; margin-bottom: 20px; }
        h2 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
        p { font-size: 13px; color: #888; margin-bottom: 28px; line-height: 1.6; }
        .alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
        .alert-error { background: #fff3f3; border: 1px solid #ffcdd2; color: #c62828; }
        .alert-success { background: #f1f8e9; border: 1px solid #c5e1a5; color: #2e7d32; }
        label { font-size: 12px; font-weight: 600; color: #444; display: block; margin-bottom: 6px; }
        input { width: 100%; padding: 12px 16px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 14px; color: #333; outline: none; background: #fafafa; margin-bottom: 20px; }
        input:focus { border-color: #1a237e; background: #fff; }
        .btn { width: 100%; padding: 13px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; background: #1a237e; color: white; }
        .btn:hover { background: #283593; }
        .steps { display: flex; gap: 8px; margin-bottom: 28px; }
        .step { flex: 1; height: 4px; border-radius: 4px; background: #e0e0e0; }
        .step.active { background: #1a237e; }
    </style>
</head>
<body>
<script th:src="@{/js/global.js}"></script>
<div class="card">
    <a href="/login" class="back-link">← Back to login</a>
    <div class="steps">
        <div class="step active"></div>
        <div class="step"></div>
        <div class="step"></div>
    </div>
    <div class="icon-wrap">🔑</div>
    <h2>Forgot password?</h2>
    <p>No worries! Enter your registered email address and we'll send you an OTP to reset your password.</p>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <form method="post" action="/forgot-password">
        <label>Registered email address</label>
        <input type="email" name="email" placeholder="you@example.com" required/>
        <button type="submit" class="btn">Send OTP →</button>
    </form>
</div>
</body>
</html>
