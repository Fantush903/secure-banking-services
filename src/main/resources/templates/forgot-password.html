<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Forgot Password — SecureBank</title>
    <link rel="stylesheet" th:href="@{/css/premium.css}"/>
    <link rel="stylesheet" th:href="@{/css/premium-auth.css}"/>
</head>
<body>
<script th:src="@{/js/global.js}"></script>

<div class="auth-wrapper">
    <div style="max-width:480px;width:100%;">
        <div class="premium-card" style="padding:48px 40px;animation:fadeInUp 0.6s ease-out;">
            <div style="text-align:center;margin-bottom:32px;">
                <div style="width:72px;height:72px;background:var(--accent-gradient);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px;box-shadow:var(--accent-glow);">🔑</div>
                <h2 style="font-size:24px;font-weight:700;color:var(--text-white);margin-bottom:4px;">Forgot Password?</h2>
                <p style="font-size:13px;color:var(--text-muted);">Enter your email and we'll send you a reset OTP</p>
            </div>

            <div th:if="${error}" class="premium-alert premium-alert-error" th:text="${error}"></div>
            <div th:if="${success}" class="premium-alert premium-alert-success" th:text="${success}"></div>

            <form method="post" action="/forgot-password">
                <div class="auth-input-group">
                    <label class="premium-label">Email address</label>
                    <input type="email" name="email" class="premium-input" placeholder="you@example.com" required id="forgotEmail"/>
                </div>
                <button type="submit" class="premium-btn" style="margin-top:8px;">Send Reset OTP →</button>
            </form>

            <p class="auth-footer" style="margin-top:24px;">
                Remember your password? <a href="/login">Sign in</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
