<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/global.css}"/>
    <title>Reset Password</title>
    <meta charset="UTF-8"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a0f1e; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; border-radius: 16px; padding: 50px 45px; width: 440px; box-shadow: 0 25px 60px rgba(0,0,0,0.5); }
        .icon-wrap { width: 64px; height: 64px; background: #e8f5e9; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 30px; margin-bottom: 20px; }
        h2 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
        p { font-size: 13px; color: #888; margin-bottom: 28px; line-height: 1.6; }
        .alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
        .alert-error { background: #fff3f3; border: 1px solid #ffcdd2; color: #c62828; }
        .alert-success { background: #f1f8e9; border: 1px solid #c5e1a5; color: #2e7d32; }
        label { font-size: 12px; font-weight: 600; color: #444; display: block; margin-bottom: 6px; }
        .input-group { margin-bottom: 16px; position: relative; }
        input { width: 100%; padding: 12px 16px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 14px; color: #333; outline: none; background: #fafafa; }
        input:focus { border-color: #1a237e; background: #fff; }
        .strength-bar { height: 4px; border-radius: 4px; margin-top: 8px; background: #eee; overflow: hidden; }
        .strength-fill { height: 100%; border-radius: 4px; transition: width 0.3s, background 0.3s; width: 0%; }
        .strength-label { font-size: 11px; margin-top: 4px; font-weight: 600; }
        .rules { background: #f5f5f5; border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; }
        .rule { font-size: 12px; color: #999; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
        .rule.ok { color: #2e7d32; }
        .btn { width: 100%; padding: 13px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; background: #1a237e; color: white; }
        .btn:hover { background: #283593; }
        .steps { display: flex; gap: 8px; margin-bottom: 28px; }
        .step { flex: 1; height: 4px; border-radius: 4px; background: #1a237e; }
    </style>
</head>
<body>
<script th:src="@{/js/global.js}"></script>
<div class="card">
    <div class="steps">
        <div class="step"></div>
        <div class="step"></div>
        <div class="step"></div>
    </div>
    <div class="icon-wrap">🔐</div>
    <h2>Create new password</h2>
    <p>Your new password must be different from your previous password.</p>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <form method="post" action="/reset-password">
        <input type="hidden" name="email" th:value="${email}"/>
        <input type="hidden" name="token" th:value="${token}"/>

        <div class="input-group">
            <label>New password</label>
            <input type="password" name="password" id="pwd" placeholder="Min 8 characters" required oninput="checkStrength(this.value)"/>
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            <div class="strength-label" id="strengthLabel" style="color:#aaa">Enter a password</div>
        </div>

        <div class="rules" id="rules">
            <div class="rule" id="r1">✗ At least 8 characters</div>
            <div class="rule" id="r2">✗ One uppercase letter</div>
            <div class="rule" id="r3">✗ One number</div>
            <div class="rule" id="r4">✗ One special character (@#$!%)</div>
        </div>

        <div class="input-group">
            <label>Confirm new password</label>
            <input type="password" name="confirmPassword" id="cpwd" placeholder="Repeat your password" required/>
        </div>

        <button type="submit" class="btn">Reset Password ✓</button>
    </form>
</div>
<script>
    function checkStrength(pw) {
        const r1 = pw.length >= 8;
        const r2 = /[A-Z]/.test(pw);
        const r3 = /[0-9]/.test(pw);
        const r4 = /[@#$!%*?&]/.test(pw);
        const score = [r1, r2, r3, r4].filter(Boolean).length;
        const fill = document.getElementById('strengthFill');
        const label = document.getElementById('strengthLabel');
        const colors = ['#e53935','#ff7043','#fdd835','#43a047'];
        const labels = ['Weak','Fair','Good','Strong'];
        fill.style.width = (score * 25) + '%';
        fill.style.background = colors[score - 1] || '#eee';
        label.textContent = labels[score - 1] || 'Enter a password';
        label.style.color = colors[score - 1] || '#aaa';
        [r1,r2,r3,r4].forEach((ok,i) => {
            const el = document.getElementById('r'+(i+1));
            el.textContent = (ok ? '✓ ' : '✗ ') + el.textContent.slice(2);
            el.className = 'rule' + (ok ? ' ok' : '');
        });
    }
</script>
</body>
</html>
