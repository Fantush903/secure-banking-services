<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Reset Password — SecureBank</title>
    <link rel="stylesheet" th:href="@{/css/premium.css}"/>
    <link rel="stylesheet" th:href="@{/css/premium-auth.css}"/>
</head>
<body>
<script th:src="@{/js/global.js}"></script>

<div class="auth-wrapper">
    <div style="max-width:480px;width:100%;">
        <div class="premium-card" style="padding:48px 40px;animation:fadeInUp 0.6s ease-out;">
            <div style="text-align:center;margin-bottom:32px;">
                <div style="width:72px;height:72px;background:var(--accent-gradient);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px;box-shadow:var(--accent-glow);">🔒</div>
                <h2 style="font-size:24px;font-weight:700;color:var(--text-white);margin-bottom:4px;">New Password</h2>
                <p style="font-size:13px;color:var(--text-muted);">Create a secure, strong password for your account</p>
            </div>

            <div th:if="${error}" class="premium-alert premium-alert-error" th:text="${error}"></div>
            <div th:if="${success}" class="premium-alert premium-alert-success" th:text="${success}"></div>

            <form method="post" action="/reset-password">
                <input type="hidden" name="email" th:value="${email}"/>
                <input type="hidden" name="token" th:value="${token}"/>

                <div class="auth-input-group" style="margin-bottom: 16px;">
                    <label class="premium-label">New password</label>
                    <input type="password" name="password" id="pwd" class="premium-input" placeholder="Min 8 characters" required oninput="checkStrength(this.value)"/>
                    <div style="height: 4px; border-radius: 4px; margin-top: 8px; background: rgba(255,255,255,0.06); overflow: hidden;">
                        <div id="strengthFill" style="height: 100%; border-radius: 4px; transition: width 0.3s, background 0.3s; width: 0%;"></div>
                    </div>
                    <div id="strengthLabel" style="font-size: 11px; margin-top: 6px; font-weight: 600; color: var(--text-muted);">Enter a password</div>
                </div>

                <div style="background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 12px; padding: 16px; margin-bottom: 24px;" id="rules">
                    <div class="rule" id="r1" style="font-size: 12px; color: var(--text-dim); margin-bottom: 6px; display: flex; align-items: center; gap: 8px;">✗ At least 8 characters</div>
                    <div class="rule" id="r2" style="font-size: 12px; color: var(--text-dim); margin-bottom: 6px; display: flex; align-items: center; gap: 8px;">✗ One uppercase letter</div>
                    <div class="rule" id="r3" style="font-size: 12px; color: var(--text-dim); margin-bottom: 6px; display: flex; align-items: center; gap: 8px;">✗ One number</div>
                    <div class="rule" id="r4" style="font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 8px;">✗ One special character (@#$!%)</div>
                </div>

                <div class="auth-input-group" style="margin-bottom: 24px;">
                    <label class="premium-label">Confirm new password</label>
                    <input type="password" name="confirmPassword" id="cpwd" class="premium-input" placeholder="Repeat your password" required/>
                </div>

                <button type="submit" class="premium-btn">Reset Password ✓</button>
            </form>
        </div>
    </div>
</div>

<script>
    function checkStrength(pw) {
        const r1 = pw.length >= 8;
        const r2 = /[A-Z]/.test(pw);
        const r3 = /[0-9]/.test(pw);
        const r4 = /[@#$!%*?&]/.test(pw);
        const score = [r1, r2, r3, r4].filter(Boolean).length;
        const fill = document.getElementById('strengthFill');
        const label = document.getElementById('strengthLabel');
        const colors = ['#ef4444','#f59e0b','#3b82f6','#10b981'];
        const labels = ['Weak','Fair','Good','Strong'];
        fill.style.width = (score * 25) + '%';
        fill.style.background = colors[score - 1] || 'transparent';
        label.textContent = labels[score - 1] || 'Enter a password';
        label.style.color = colors[score - 1] || 'var(--text-muted)';
        
        const rules = [
            { el: document.getElementById('r1'), text: 'At least 8 characters', ok: r1 },
            { el: document.getElementById('r2'), text: 'One uppercase letter', ok: r2 },
            { el: document.getElementById('r3'), text: 'One number', ok: r3 },
            { el: document.getElementById('r4'), text: 'One special character (@#$!%)', ok: r4 }
        ];
        
        rules.forEach(rule => {
            rule.el.textContent = (rule.ok ? '✓ ' : '✗ ') + rule.text;
            rule.el.style.color = rule.ok ? 'var(--success)' : 'var(--text-dim)';
        });
    }
</script>
</body>
</html>
