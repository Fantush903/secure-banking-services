<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/premium.css?v=2}"/>
    <link rel="stylesheet" th:href="@{/css/premium-auth.css?v=2}"/>
    <title>Error — SecureBank</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
</head>
<body>
<script th:src="@{/js/global.js}"></script>
<div class="container">
    <div class="code" th:text="${status ?: '500'}">500</div>
    <div class="icon">⚠️</div>
    <h2 th:text="${error ?: 'Something went wrong'}">Something went wrong</h2>
    <p>An unexpected error occurred. Please try again.</p>
    <div class="error-detail" th:if="${message}" th:text="${message}"></div>
    <div class="btn-group">
        <a href="/login">← Back to Login</a>
        <a href="javascript:history.back()" class="secondary">Go Back</a>
    </div>
</div>
</body>
</html>
