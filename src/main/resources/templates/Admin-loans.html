<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/premium.css}"/>
    <title>Loan Approval — Admin</title>
    <meta charset="UTF-8"/>
</head>
<body>
<script th:src="@{/js/global.js}"></script>
<div class="premium-sidebar">
    <div class="sidebar-logo">
        <div class="sidebar-logo-icon">🛡️</div>
        <span class="sidebar-logo-text">SecureBank</span>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section">Admin Panel</div>
        <a href="/admin/dashboard" class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
        <a href="/admin/customers" class="nav-item"><span class="nav-icon">👥</span> All Customers</a>
        <a href="/admin/transactions" class="nav-item"><span class="nav-icon">💸</span> Transactions</a>
        <a href="/admin/loans" class="nav-item active"><span class="nav-icon">🏠</span> Loan Approval</a>
        <a href="/admin/audit" class="nav-item"><span class="nav-icon">📋</span> Audit Log</a>
        <a href="/admin/settings" class="nav-item"><span class="nav-icon">⚙️</span> Settings</a>
    </nav>
    <div class="sidebar-bottom">
        <a href="/logout" class="btn-logout premium-btn">🚪 Sign Out</a>
    </div>
</div>
<div class="premium-main">
    <div class="premium-topbar">
        <button class="mobile-menu-btn premium-btn" onclick="">☰</button>
        <span class="topbar-title">🏠 Loan Approval</span>
        <button class="dark-mode-toggle premium-btn" onclick="toggleDarkMode()">🌙</button>

    </div>
    <div class="premium-content">
        <div class="tabs">
            <button class="tab-btn active premium-btn">⏳ Pending (0)</button>
            <button class="tab-btn premium-btn">✅ Approved (0)</button>
            <button class="tab-btn premium-btn">❌ Rejected (0)</button>
            <button class="tab-btn premium-btn">📋 All (0)</button>
        </div>
        <div class="premium-card">
            <div class="premium-card-header">
                <h3 class="premium-card-title">Pending Loan Applications</h3>
            </div>
            <div class="empty-state">
                <div style="font-size:40px;margin-bottom:10px">📭</div>
                <div>No pending loan applications</div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
