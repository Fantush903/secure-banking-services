<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Verify OTP — SecureBank</title>
    <link rel="stylesheet" th:href="@{/css/premium.css}"/>
    <link rel="stylesheet" th:href="@{/css/premium-auth.css}"/>
</head>
<body>
<script th:src="@{/js/global.js}"></script>

<div class="auth-wrapper">
    <div style="max-width:480px;width:100%;">
        <div class="premium-card" style="padding:48px 40px;text-align:center;animation:fadeInUp 0.6s ease-out;">
            <!-- Logo -->
            <div style="margin-bottom:28px;">
                <div style="width:72px;height:72px;background:var(--accent-gradient);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px;box-shadow:var(--accent-glow);">🔐</div>
                <h2 style="font-size:24px;font-weight:700;color:var(--text-white);margin-bottom:4px;">Verify Your Identity</h2>
                <p style="font-size:13px;color:var(--text-muted);">
                    We sent a 6-digit code to <strong th:text="${email}" style="color:var(--accent-primary);">email@example.com</strong>
                </p>
            </div>

            <div th:if="${error}" class="premium-alert premium-alert-error" th:text="${error}"></div>
            <div th:if="${success}" class="premium-alert premium-alert-success" th:text="${success}"></div>

            <!-- OTP Fallback Display (when email delivery fails) -->
            <div th:if="${otpFallback}" style="background:linear-gradient(135deg,rgba(99,102,241,0.15),rgba(139,92,246,0.15));border:2px dashed var(--accent-primary);border-radius:16px;padding:24px;margin:16px 0;text-align:center;">
                <p style="color:var(--text-muted);font-size:12px;margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:1px;">📩 Your OTP Code</p>
                <div th:text="${otpFallback}" style="font-size:42px;font-weight:900;color:var(--accent-primary);letter-spacing:12px;font-family:monospace;"></div>
                <p style="color:var(--text-dim);font-size:11px;margin-top:8px;">⏱ Valid for 5 minutes • Copy this code below</p>
            </div>

            <form method="post" action="/verify-otp" id="otpForm">
                <input type="hidden" name="email" th:value="${email}"/>
                <input type="hidden" name="type" th:value="${type}"/>

                <!-- OTP Input -->
                <div class="otp-container" id="otpContainer">
                    <input type="text" maxlength="1" class="otp-input" data-index="0" autocomplete="off"/>
                    <input type="text" maxlength="1" class="otp-input" data-index="1" autocomplete="off"/>
                    <input type="text" maxlength="1" class="otp-input" data-index="2" autocomplete="off"/>
                    <input type="text" maxlength="1" class="otp-input" data-index="3" autocomplete="off"/>
                    <input type="text" maxlength="1" class="otp-input" data-index="4" autocomplete="off"/>
                    <input type="text" maxlength="1" class="otp-input" data-index="5" autocomplete="off"/>
                </div>
                <!-- Hidden real OTP field -->
                <input type="hidden" name="otp" id="otpHidden"/>

                <!-- Timer -->
                <div class="otp-timer">
                    <span id="timerText">Resend OTP in <span id="countdown">60</span>s</span>
                </div>

                <button type="submit" class="premium-btn" id="verifyBtn" style="margin-bottom:16px;">Verify OTP →</button>

                <a th:href="@{/resend-otp(email=${email},type=${type})}" class="resend-link disabled" id="resendLink">Resend OTP</a>
            </form>

            <p style="margin-top:24px;font-size:12px;color:var(--text-dim);">
                Didn't receive the code? Check your spam folder or
                <a href="/login" style="color:var(--accent-primary);font-weight:500;">go back to login</a>
            </p>
        </div>
    </div>
</div>

<script>
    // OTP input auto-focus and paste handling
    const inputs = document.querySelectorAll('.otp-input');
    const hiddenOtp = document.getElementById('otpHidden');

    function updateHidden() {
        let otp = '';
        inputs.forEach(i => otp += i.value);
        hiddenOtp.value = otp;
    }

    inputs.forEach((input, idx) => {
        input.addEventListener('input', (e) => {
            const val = e.target.value;
            if (val && idx < inputs.length - 1) inputs[idx + 1].focus();
            updateHidden();
        });
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !input.value && idx > 0) {
                inputs[idx - 1].focus();
            }
        });
        input.addEventListener('paste', (e) => {
            e.preventDefault();
            const data = (e.clipboardData || window.clipboardData).getData('text').trim();
            if (data.length === 6 && /^\d+$/.test(data)) {
                data.split('').forEach((ch, i) => { if (inputs[i]) inputs[i].value = ch; });
                inputs[5].focus();
                updateHidden();
            }
        });
    });
    inputs[0].focus();

    // Countdown timer
    let seconds = 60;
    const countdownEl = document.getElementById('countdown');
    const timerText = document.getElementById('timerText');
    const resendLink = document.getElementById('resendLink');

    const timer = setInterval(() => {
        seconds--;
        countdownEl.textContent = seconds;
        if (seconds <= 0) {
            clearInterval(timer);
            timerText.style.display = 'none';
            resendLink.classList.remove('disabled');
        }
    }, 1000);
</script>
</body>
</html>
