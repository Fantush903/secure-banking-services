<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/global.css}"/>
    <title>Transactions — Admin</title>
    <meta charset="UTF-8"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f8; min-height: 100vh; display: flex; }
        .sidebar { width: 240px; background: #1a1a2e; min-height: 100vh; display: flex; flex-direction: column; flex-shrink: 0; position: fixed; top: 0; left: 0; height: 100%; z-index: 100; }
        .sidebar-logo { padding: 24px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .sidebar-logo-icon { width: 40px; height: 40px; background: #e53935; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .sidebar-logo-text { font-size: 16px; font-weight: 700; color: white; }
        .sidebar-nav { flex: 1; padding: 16px 0; }
        .nav-section { padding: 8px 20px 4px; font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; font-size: 13px; color: rgba(255,255,255,0.65); text-decoration: none; transition: all 0.2s; border-left: 3px solid transparent; }
        .nav-item:hover { background: rgba(255,255,255,0.06); color: white; }
        .nav-item.active { background: rgba(229,57,53,0.15); color: white; border-left-color: #e53935; font-weight: 600; }
        .nav-icon { font-size: 17px; width: 22px; text-align: center; }
        .sidebar-bottom { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.08); }
        .btn-logout { width: 100%; padding: 10px; background: rgba(229,57,53,0.15); color: #ef9a9a; border: 1px solid rgba(229,57,53,0.25); border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .main { margin-left: 240px; flex: 1; }
        .topbar { background: white; padding: 0 30px; height: 64px; display: flex; align-items: center; border-bottom: 1px solid #e8e8e8; position: sticky; top: 0; z-index: 50; }
        .topbar-title { font-size: 18px; font-weight: 700; color: #1a1a2e; }
        .content { padding: 28px 30px; }
        .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: white; border-radius: 12px; padding: 18px 20px; border: 0.5px solid #e8e8e8; }
        .stat-value { font-size: 22px; font-weight: 700; color: #1a1a2e; }
        .stat-label { font-size: 12px; color: #999; margin-top: 4px; }
        .filter-bar { background: white; border-radius: 12px; padding: 14px 20px; display: flex; gap: 12px; margin-bottom: 20px; border: 0.5px solid #e8e8e8; flex-wrap: wrap; }
        .filter-bar input, .filter-bar select { padding: 9px 14px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 13px; outline: none; }
        .filter-bar input:focus, .filter-bar select:focus { border-color: #1a237e; }
        .card { background: white; border-radius: 14px; border: 0.5px solid #e8e8e8; overflow: hidden; }
        .card-header { padding: 16px 22px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .card-title { font-size: 15px; font-weight: 600; color: #1a1a2e; }
        table { width: 100%; border-collapse: collapse; }
        th { font-size: 11px; font-weight: 700; color: #bbb; text-transform: uppercase; padding: 12px 22px; text-align: left; background: #fafafa; }
        td { padding: 13px 22px; font-size: 13px; color: #444; border-bottom: 1px solid #f8f8f8; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-green { background: #e8f5e9; color: #2e7d32; }
        .badge-red { background: #ffebee; color: #c62828; }
        .badge-blue { background: #e3f2fd; color: #1565c0; }
        .badge-yellow { background: #fff8e1; color: #f57f17; }
        .amount-credit { color: #2e7d32; font-weight: 700; }
        .amount-debit { color: #c62828; font-weight: 700; }
        .empty-state { text-align: center; padding: 50px; color: #ccc; }
    </style>
</head>
<body>
<script th:src="@{/js/global.js}"></script>
<div class="sidebar">
    <div class="sidebar-logo">
        <div class="sidebar-logo-icon">🛡️</div>
        <span class="sidebar-logo-text">SecureBank</span>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section">Admin Panel</div>
        <a href="/admin/dashboard" class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
        <a href="/admin/customers" class="nav-item"><span class="nav-icon">👥</span> All Customers</a>
        <a href="/admin/transactions" class="nav-item active"><span class="nav-icon">💸</span> Transactions</a>
        <a href="/admin/loans" class="nav-item"><span class="nav-icon">🏠</span> Loan Approval</a>
        <a href="/admin/audit" class="nav-item"><span class="nav-icon">📋</span> Audit Log</a>
        <a href="/admin/settings" class="nav-item"><span class="nav-icon">⚙️</span> Settings</a>
    </nav>
    <div class="sidebar-bottom">
        <a href="/logout" class="btn-logout">🚪 Sign Out</a>
    </div>
</div>
<div class="main">
    <div class="topbar">
        <button class="mobile-menu-btn" onclick="">☰</button>
        <span class="topbar-title">💸 All Transactions</span>
        <button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙</button>

    </div>
    <div class="content">
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-value">0</div>
                <div class="stat-label">Total Transactions</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" style="color:#2e7d32">₹ 0</div>
                <div class="stat-label">Total Credited</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" style="color:#c62828">₹ 0</div>
                <div class="stat-label">Total Debited</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" style="color:#f57f17">0</div>
                <div class="stat-label">Fraud Alerts</div>
            </div>
        </div>
        <div class="filter-bar">
            <input type="date" placeholder="From"/>
            <input type="date" placeholder="To"/>
            <select><option>All Types</option><option>CREDIT</option><option>DEBIT</option><option>TRANSFER</option></select>
            <select><option>All Status</option><option>SUCCESS</option><option>FAILED</option><option>PENDING</option></select>
        </div>
        <div class="card">
            <div class="card-header">
                <span class="card-title">Transaction History</span>
                <span style="font-size:12px;color:#888">All system transactions</span>
            </div>
            <div class="empty-state">
                <div style="font-size:40px;margin-bottom:10px">📭</div>
                <div>No transactions found in the system yet</div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
