<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/premium.css}"/>
    <title>Transactions — Admin</title>
    <meta charset="UTF-8"/>
</head>
<body>
<script th:src="@{/js/global.js}"></script>
<div class="premium-sidebar">
    <div class="sidebar-logo">
        <div class="sidebar-logo-icon">🛡️</div>
        <span class="sidebar-logo-text">SecureBank</span>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section">Admin Panel</div>
        <a href="/admin/dashboard" class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
        <a href="/admin/customers" class="nav-item"><span class="nav-icon">👥</span> All Customers</a>
        <a href="/admin/transactions" class="nav-item active"><span class="nav-icon">💸</span> Transactions</a>
        <a href="/admin/loans" class="nav-item"><span class="nav-icon">🏠</span> Loan Approval</a>
        <a href="/admin/audit" class="nav-item"><span class="nav-icon">📋</span> Audit Log</a>
        <a href="/admin/settings" class="nav-item"><span class="nav-icon">⚙️</span> Settings</a>
    </nav>
    <div class="sidebar-bottom">
        <a href="/logout" class="btn-logout premium-btn">🚪 Sign Out</a>
    </div>
</div>
<div class="premium-main">
    <div class="premium-topbar">
        <button class="mobile-menu-btn premium-btn" onclick="">☰</button>
        <span class="topbar-title">💸 All Transactions</span>
        <button class="dark-mode-toggle premium-btn" onclick="toggleDarkMode()">🌙</button>
    </div>
    <div class="premium-content">
        <div class="stats-row">
            <div class="stat-card premium-card">
                <div class="stat-value">0</div>
                <div class="stat-label">Total Transactions</div>
            </div>
            <div class="stat-card premium-card">
                <div class="stat-value" style="color:#2e7d32">₹ 0</div>
                <div class="stat-label">Total Credited</div>
            </div>
            <div class="stat-card premium-card">
                <div class="stat-value" style="color:#c62828">₹ 0</div>
                <div class="stat-label">Total Debited</div>
            </div>
            <div class="stat-card premium-card">
                <div class="stat-value" style="color:#f57f17">0</div>
                <div class="stat-label">Fraud Alerts</div>
            </div>
        </div>
        <div class="filter-bar premium-card">
            <input type="date" class="premium-input" placeholder="From"/>
            <input type="date" class="premium-input" placeholder="To"/>
            <select class="premium-select"><option>All Types</option><option>CREDIT</option><option>DEBIT</option><option>TRANSFER</option></select>
            <select class="premium-select"><option>All Status</option><option>SUCCESS</option><option>FAILED</option><option>PENDING</option></select>
        </div>
        <div class="premium-card">
            <div class="premium-card-header">
                <h3 class="premium-card-title">Transaction History</h3>
                <span style="font-size:12px;color:#888">All system transactions</span>
            </div>
            <div class="empty-state">
                <div style="font-size:40px;margin-bottom:10px">📭</div>
                <div>No transactions found in the system yet</div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
