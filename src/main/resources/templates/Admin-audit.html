<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/premium.css}"/>
    <title>Audit Log — Admin</title>
    <meta charset="UTF-8"/>
</head>
<body>
<script th:src="@{/js/global.js}"></script>
<div class="premium-sidebar">
    <div class="sidebar-logo">
        <div class="sidebar-logo-icon">🛡️</div>
        <span class="sidebar-logo-text">SecureBank</span>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section">Admin Panel</div>
        <a href="/admin/dashboard" class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
        <a href="/admin/customers" class="nav-item"><span class="nav-icon">👥</span> All Customers</a>
        <a href="/admin/transactions" class="nav-item"><span class="nav-icon">💸</span> Transactions</a>
        <a href="/admin/loans" class="nav-item"><span class="nav-icon">🏠</span> Loan Approval</a>
        <a href="/admin/audit" class="nav-item active"><span class="nav-icon">📋</span> Audit Log</a>
        <a href="/admin/settings" class="nav-item"><span class="nav-icon">⚙️</span> Settings</a>
    </nav>
    <div class="sidebar-bottom">
        <a href="/logout" class="btn-logout premium-btn">🚪 Sign Out</a>
    </div>
</div>
<div class="premium-main">
    <div class="premium-topbar">
        <button class="mobile-menu-btn premium-btn" onclick="">☰</button>
        <button class="dark-mode-toggle premium-btn" onclick="toggleDarkMode()">🌙</button>
        <span class="topbar-title">📋 Audit Log</span>
    </div>
    <div class="premium-content">
        <div class="premium-card">
            <div class="premium-card-header">
                <h3 class="premium-card-title">System Activity Log</h3>
                <span style="font-size:12px;color:#888">All user & admin actions</span>
            </div>
            <table class="premium-table">
                <tr>
                    <th>Time</th>
                    <th>User</th>
                    <th>Action</th>
                    <th>Details</th>
                    <th>Status</th>
                </tr>
                <tr th:each="log : ${logs}">
                    <td th:text="${log.timestamp}">—</td>
                    <td th:text="${log.userEmail}">—</td>
                    <td th:text="${log.action}">—</td>
                    <td th:text="${log.details}">—</td>
                    <td><span class="badge badge-green">Success</span></td>
                </tr>
            </table>
            <div th:if="${logs == null or logs.isEmpty()}">
                <div class="empty-state">
                    <div style="font-size:36px;margin-bottom:10px">📋</div>
                    <div>No audit logs yet. Actions will appear here.</div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
