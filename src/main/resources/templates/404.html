<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" th:href="@{/css/premium.css}"/>
    <link rel="stylesheet" th:href="@{/css/premium-auth.css}"/>
    <title>Page Not Found — SecureBank</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
</head>
<body>
<script th:src="@{/js/global.js}"></script>

<div class="auth-wrapper">
    <div style="max-width:480px;width:100%;">
        <div class="premium-card animate-in" style="padding:48px 40px;text-align:center;">
            <div style="font-size:100px;font-weight:900;background:var(--accent-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:16px;text-shadow:var(--accent-glow);">404</div>
            <div style="font-size:48px;margin-bottom:20px;">🔍</div>
            <h2 style="font-size:24px;font-weight:700;color:var(--text-white);margin-bottom:12px;">Page Not Found</h2>
            <p style="font-size:14px;color:var(--text-muted);margin-bottom:32px;line-height:1.6;">The page you're looking for doesn't exist, has been moved, or you don't have permission to view it.</p>
            <a href="/login" class="premium-btn" style="display:inline-block;width:auto;padding:14px 32px;">← Back to Safety</a>
        </div>
    </div>
</div>
