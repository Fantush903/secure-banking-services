<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/global.css}"/>
    <title>All Customers — Admin</title>
    <meta charset="UTF-8"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f8; min-height: 100vh; display: flex; }
        .sidebar { width: 240px; background: #1a1a2e; min-height: 100vh; display: flex; flex-direction: column; flex-shrink: 0; position: fixed; top: 0; left: 0; height: 100%; z-index: 100; }
        .sidebar-logo { padding: 24px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .sidebar-logo-icon { width: 40px; height: 40px; background: #e53935; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .sidebar-logo-text { font-size: 16px; font-weight: 700; color: white; }
        .sidebar-nav { flex: 1; padding: 16px 0; }
        .nav-section { padding: 8px 20px 4px; font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; font-size: 13px; color: rgba(255,255,255,0.65); text-decoration: none; transition: all 0.2s; border-left: 3px solid transparent; }
        .nav-item:hover { background: rgba(255,255,255,0.06); color: white; }
        .nav-item.active { background: rgba(229,57,53,0.15); color: white; border-left-color: #e53935; font-weight: 600; }
        .nav-icon { font-size: 17px; width: 22px; text-align: center; }
        .sidebar-bottom { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.08); }
        .btn-logout { width: 100%; padding: 10px; background: rgba(229,57,53,0.15); color: #ef9a9a; border: 1px solid rgba(229,57,53,0.25); border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .main { margin-left: 240px; flex: 1; }
        .topbar { background: white; padding: 0 30px; height: 64px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e8e8e8; position: sticky; top: 0; z-index: 50; }
        .topbar-title { font-size: 18px; font-weight: 700; color: #1a1a2e; }
        .content { padding: 28px 30px; }
        .search-bar { background: white; border-radius: 12px; padding: 16px 20px; display: flex; gap: 12px; align-items: center; margin-bottom: 20px; border: 0.5px solid #e8e8e8; }
        .search-bar input { flex: 1; padding: 10px 14px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none; }
        .search-bar input:focus { border-color: #1a237e; }
        .search-bar select { padding: 10px 14px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 13px; outline: none; }
        .card { background: white; border-radius: 14px; border: 0.5px solid #e8e8e8; overflow: hidden; }
        .card-header { padding: 16px 22px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .card-title { font-size: 15px; font-weight: 600; color: #1a1a2e; }
        table { width: 100%; border-collapse: collapse; }
        th { font-size: 11px; font-weight: 700; color: #bbb; text-transform: uppercase; letter-spacing: 0.5px; padding: 12px 22px; text-align: left; background: #fafafa; }
        td { padding: 14px 22px; font-size: 13px; color: #444; border-bottom: 1px solid #f8f8f8; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-green { background: #e8f5e9; color: #2e7d32; }
        .badge-red { background: #ffebee; color: #c62828; }
        .badge-blue { background: #e3f2fd; color: #1565c0; }
        .badge-orange { background: #fff3e0; color: #e65100; }
        .action-btn { padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; text-decoration: none; display: inline-block; margin-right: 4px; }
        .btn-lock { background: #ffebee; color: #c62828; }
        .btn-unlock { background: #e8f5e9; color: #2e7d32; }
        .btn-view { background: #e3f2fd; color: #1565c0; }
        .avatar { width: 34px; height: 34px; border-radius: 50%; background: #e8eaf6; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #1a237e; }
        .user-cell { display: flex; align-items: center; gap: 10px; }
        .alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
        .alert-success { background: #f1f8e9; border: 1px solid #c5e1a5; color: #2e7d32; }
    </style>
</head>
<body>
<script th:src="@{/js/global.js}"></script>
<div class="sidebar">
    <div class="sidebar-logo">
        <div class="sidebar-logo-icon">🛡️</div>
        <span class="sidebar-logo-text">SecureBank</span>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section">Admin Panel</div>
        <a href="/admin/dashboard" class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
        <a href="/admin/customers" class="nav-item active"><span class="nav-icon">👥</span> All Customers</a>
        <a href="/admin/transactions" class="nav-item"><span class="nav-icon">💸</span> Transactions</a>
        <a href="/admin/loans" class="nav-item"><span class="nav-icon">🏠</span> Loan Approval</a>
        <a href="/admin/audit" class="nav-item"><span class="nav-icon">📋</span> Audit Log</a>
        <a href="/admin/settings" class="nav-item"><span class="nav-icon">⚙️</span> Settings</a>
    </nav>
    <div class="sidebar-bottom">
        <a href="/logout" class="btn-logout">🚪 Sign Out</a>
    </div>
</div>
<div class="main">
    <div class="topbar">
        <button class="mobile-menu-btn" onclick="">☰</button>
        <button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙</button>
        <span class="topbar-title">👥 All Customers</span>
    </div>
    <div class="content">
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 Search by name or email..." oninput="filterTable()"/>
            <select id="statusFilter" onchange="filterTable()">
                <option value="">All Status</option>
                <option value="ACTIVE">Active</option>
                <option value="LOCKED">Locked</option>
            </select>
            <select id="roleFilter" onchange="filterTable()">
                <option value="">All Roles</option>
                <option value="CUSTOMER">Customer</option>
                <option value="ADMIN">Admin</option>
            </select>
        </div>
        <div class="card">
            <div class="card-header">
                <span class="card-title">Registered Users</span>
                <span style="font-size:13px;color:#888" th:text="${customers != null ? customers.size() + ' total' : '0 total'}">0 total</span>
            </div>
            <table id="customerTable">
                <tr>
                    <th>User</th>
                    <th>Phone</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Failed Logins</th>
                    <th>Actions</th>
                </tr>
                <tr th:each="c : ${customers}">
                    <td>
                        <div class="user-cell">
                            <div class="avatar" th:text="${c.name != null ? c.name.substring(0,1) : 'U'}">U</div>
                            <div>
                                <div style="font-weight:600" th:text="${c.name}">—</div>
                                <div style="font-size:11px;color:#aaa" th:text="${c.email}">—</div>
                            </div>
                        </div>
                    </td>
                    <td th:text="${c.phone ?: '—'}">—</td>
                    <td><span class="badge" th:classappend="${c.role == 'ADMIN'} ? 'badge-orange' : 'badge-blue'" th:text="${c.role}">—</span></td>
                    <td><span class="badge" th:classappend="${c.status == 'ACTIVE'} ? 'badge-green' : 'badge-red'" th:text="${c.status}">—</span></td>
                    <td th:text="${c.failedLogins}">0</td>
                    <td>
                        <a th:href="'/admin/toggle-status/' + ${c.customerID}" class="action-btn" th:classappend="${c.status == 'ACTIVE'} ? 'btn-lock' : 'btn-unlock'" th:text="${c.status == 'ACTIVE'} ? '🔒 Lock' : '🔓 Unlock'">Action</a>
                        <a th:href="'/admin/reset-user/' + ${c.customerID}" class="action-btn btn-view">🔑 Reset</a>
                    </td>
                </tr>
            </table>
        </div>
    </div>
</div>
<script>
    function filterTable() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const status = document.getElementById('statusFilter').value;
        const role = document.getElementById('roleFilter').value;
        const rows = document.querySelectorAll('#customerTable tr:not(:first-child)');
        rows.forEach(row => {
            const text = row.textContent.toLowerCase();
            const matchSearch = text.includes(search);
            const matchStatus = !status || text.includes(status.toLowerCase());
            const matchRole = !role || text.includes(role.toLowerCase());
            row.style.display = (matchSearch && matchStatus && matchRole) ? '' : 'none';
        });
    }
</script>
</body>
</html>
