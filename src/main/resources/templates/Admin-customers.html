<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/premium.css}"/>
    <title>All Customers — Admin</title>
    <meta charset="UTF-8"/>
</head>
<body>
<script th:src="@{/js/global.js}"></script>
<div class="premium-sidebar">
    <div class="sidebar-logo">
        <div class="sidebar-logo-icon">🛡️</div>
        <span class="sidebar-logo-text">SecureBank</span>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section">Admin Panel</div>
        <a href="/admin/dashboard" class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
        <a href="/admin/customers" class="nav-item active"><span class="nav-icon">👥</span> All Customers</a>
        <a href="/admin/transactions" class="nav-item"><span class="nav-icon">💸</span> Transactions</a>
        <a href="/admin/loans" class="nav-item"><span class="nav-icon">🏠</span> Loan Approval</a>
        <a href="/admin/audit" class="nav-item"><span class="nav-icon">📋</span> Audit Log</a>
        <a href="/admin/settings" class="nav-item"><span class="nav-icon">⚙️</span> Settings</a>
    </nav>
    <div class="sidebar-bottom">
        <a href="/logout" class="btn-logout premium-btn">🚪 Sign Out</a>
    </div>
</div>
<div class="premium-main">
    <div class="premium-topbar">
        <button class="mobile-menu-btn premium-btn" onclick="">☰</button>
        <button class="dark-mode-toggle premium-btn" onclick="toggleDarkMode()">🌙</button>
        <span class="topbar-title">👥 All Customers</span>
    </div>
    <div class="premium-content">
        <div th:if="${success}" class="premium-alert premium-alert-success" th:text="${success}"></div>
        <div class="search-bar premium-card">
            <input type="text" id="searchInput" class="premium-input" placeholder="🔍 Search by name or email..." oninput="filterTable()"/>
            <select id="statusFilter" class="premium-select" onchange="filterTable()">
                <option value="">All Status</option>
                <option value="ACTIVE">Active</option>
                <option value="LOCKED">Locked</option>
            </select>
            <select id="roleFilter" class="premium-select" onchange="filterTable()">
                <option value="">All Roles</option>
                <option value="CUSTOMER">Customer</option>
                <option value="ADMIN">Admin</option>
            </select>
        </div>
        <div class="premium-card">
            <div class="premium-card-header">
                <h3 class="premium-card-title">Registered Users</h3>
                <span style="font-size:13px;color:#888" th:text="${customers != null ? customers.size() + ' total' : '0 total'}">0 total</span>
            </div>
            <table id="customerTable" class="premium-table">
                <tr>
                    <th>User</th>
                    <th>Phone</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Failed Logins</th>
                    <th>Actions</th>
                </tr>
                <tr th:each="c : ${customers}">
                    <td>
                        <div class="user-cell">
                            <div class="avatar" th:text="${c.name != null and c.name.length() > 0 ? c.name.substring(0,1) : 'U'}">U</div>
                            <div>
                                <div style="font-weight:600" th:text="${c.name}">—</div>
                                <div style="font-size:11px;color:#aaa" th:text="${c.email}">—</div>
                            </div>
                        </div>
                    </td>
                    <td th:text="${c.phone ?: '—'}">—</td>
                    <td><span class="badge" th:classappend="${c.role == 'ADMIN'} ? 'badge-orange' : 'badge-blue'" th:text="${c.role}">—</span></td>
                    <td><span class="badge" th:classappend="${c.status == 'ACTIVE'} ? 'badge-green' : 'badge-red'" th:text="${c.status}">—</span></td>
                    <td th:text="${c.failedLogins}">0</td>
                    <td>
                        <a th:href="'/admin/toggle-status/' + ${c.customerID}" class="premium-btn action-btn" th:classappend="${c.status == 'ACTIVE'} ? 'btn-lock' : 'btn-unlock'" th:text="${c.status == 'ACTIVE'} ? '🔒 Lock' : '🔓 Unlock'">Action</a>
                        <a th:href="'/admin/reset-user/' + ${c.customerID}" class="premium-btn action-btn btn-view">🔑 Reset</a>
                    </td>
                </tr>
            </table>
        </div>
    </div>
</div>
<script>
    function filterTable() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const status = document.getElementById('statusFilter').value;
        const role = document.getElementById('roleFilter').value;
        const rows = document.querySelectorAll('#customerTable tr:not(:first-child)');
        rows.forEach(row => {
            const text = row.textContent.toLowerCase();
            const matchSearch = text.includes(search);
            const matchStatus = !status || text.includes(status.toLowerCase());
            const matchRole = !role || text.includes(role.toLowerCase());
            row.style.display = (matchSearch && matchStatus && matchRole) ? '' : 'none';
        });
    }
</script>
</body>
</html>
