# Application
spring.application.name=OnlineBankingWeb

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/banking_db?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:bank_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:BankPass@2024}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Server
server.port=${PORT:8080}
server.error.whitelabel.enabled=false

# Thymeleaf
spring.thymeleaf.cache=false

# Session
server.servlet.session.timeout=30m

# Gmail SMTP - Using SSL on port 465 (more reliable than STARTTLS on cloud)
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME:fantusharyanfkb@gmail.com}
spring.mail.password=${MAIL_PASSWORD:zdrkjdinexjfehux}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=8000
spring.mail.properties.mail.smtp.timeout=8000
spring.mail.properties.mail.smtp.writetimeout=8000
spring.mail.default-encoding=UTF-8

# Logging
logging.level.com.banking=INFO
logging.level.org.springframework.security=WARN

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
